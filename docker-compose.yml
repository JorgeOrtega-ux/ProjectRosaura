version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rosaura_app
    restart: always
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - TZ=${APP_TIMEZONE:-UTC}
    networks:
      - rosaura_network

  db:
    image: mysql:8.0
    container_name: rosaura_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    env_file:
      - .env
    environment:
      - TZ=${APP_TIMEZONE:-UTC}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rosaura_network

  redis:
    image: redis:alpine
    container_name: rosaura_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rosaura_network

  websocket_server:
    build:
      context: .
      dockerfile: docker/python/Dockerfile.worker
    container_name: rosaura_websocket
    restart: always
    command: python -u scripts/websocket_server.py
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - TZ=${APP_TIMEZONE:-UTC}
    networks:
      - rosaura_network

  worker_backups:
    build:
      context: .
      dockerfile: docker/python/Dockerfile.worker
    container_name: rosaura_worker_backups
    restart: always
    command: python -u scripts/worker_backups.py
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - TZ=${APP_TIMEZONE:-UTC}
    networks:
      - rosaura_network

  worker_system_tasks:
    build:
      context: .
      dockerfile: docker/python/Dockerfile.worker
    container_name: rosaura_worker_system_tasks
    restart: always
    command: python -u scripts/worker_system_tasks.py
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - TZ=${APP_TIMEZONE:-UTC}
    networks:
      - rosaura_network

  worker_telemetry:
    build:
      context: .
      dockerfile: docker/python/Dockerfile.worker
    container_name: rosaura_worker_telemetry
    restart: always
    command: python -u scripts/worker_telemetry.py
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - TZ=${APP_TIMEZONE:-UTC}
    networks:
      - rosaura_network

  worker_canvas_persistence:
    build:
      context: .
      dockerfile: docker/python/Dockerfile.worker
    container_name: rosaura_worker_canvas_persistence
    restart: always
    command: python -u scripts/worker_canvas_persistence.py
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - TZ=${APP_TIMEZONE:-UTC}
    networks:
      - rosaura_network

networks:
  rosaura_network:
    driver: bridge

volumes:
  db_data:
  redis_data:
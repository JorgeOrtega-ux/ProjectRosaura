version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rosaura_app
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - TZ=${APP_TIMEZONE:-UTC}
    networks:
      - rosaura_network

  db:
    image: mysql:8.0
    container_name: rosaura_db
    restart: always
    environment:
      # Docker usará esto para crear todo automáticamente
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_IDENTITY_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      TZ: ${APP_TIMEZONE:-UTC}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Tu script db_identity.sql seguirá ejecutándose para crear las tablas
      - ./docker/mysql/init:/docker-entrypoint-initdb.d 
    networks:
      - rosaura_network
    healthcheck:
      # El healthcheck ahora usa la variable DB_ROOT_PASSWORD correcta
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: rosaura_redis
    restart: always
    environment:
      - TZ=${APP_TIMEZONE:-UTC}
    command: redis-server --requirepass "${REDIS_PASS}"
    env_file:
      - .env
    ports:
      - "6379:6379"
    networks:
      - rosaura_network

  worker_backups:
    build:
      context: .
      dockerfile: docker/python/Dockerfile.worker
    container_name: rosaura_worker_backups
    restart: always
    command: python -u scripts/worker_backups.py
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - TZ=${APP_TIMEZONE:-UTC}
    networks:
      - rosaura_network

  worker_account_deletion:
    build:
      context: .
      dockerfile: docker/python/Dockerfile.worker
    container_name: rosaura_worker_account_deletion
    restart: always
    command: python -u scripts/worker_account_deletion.py
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - TZ=${APP_TIMEZONE:-UTC}
    networks:
      - rosaura_network

  worker_maintenance:
    build:
      context: .
      dockerfile: docker/python/Dockerfile.worker
    container_name: rosaura_worker_maintenance
    restart: always
    command: python -u scripts/worker_maintenance.py
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - TZ=${APP_TIMEZONE:-UTC}
    networks:
      - rosaura_network

networks:
  rosaura_network:
    driver: bridge

volumes:
  db_data: